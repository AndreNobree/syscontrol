<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
</head>
<body>
    <div class="menu-lateral">
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="../pdv/index.html">PDV</a></li>
            <li><a href="../estoque/index.html">Estoque</a></li>
            <li><a href="#">Compras & Fornecedores</a></li>
            <li><a href="#">Relatórios</a></li>
            <li><a href="#">Usuários</a></li>
            <li><a href="#">Configurações</a></li>
        </ul>
    </div>

    <div class="home">
        <div class="menu-superior">
            <div class="nome-sistema">
                <img src="../../media/pngwing.com (2).png" id="menu-png">
                <h4>Syscontrol</h4>
            </div>
            <div></div>
            <div class="btn-info">
                <img src="../../media/pngwing.com.png" id="user-png">
                <img src="../../media/pngwing.com (1).png" id="logout-png">
            </div>
        </div>

        <div class="pdv">
            <div class="form-produtos"> 
                <form action="">
                    <div class="sit-caixa">
                        <p> CAIXA ABERTO</p>
                    </div>
                    
                    <div class="inputs-superior">
                        <div class="codigo">
                            <label for="">Código:</label><br>
                            <input type="text" id="codigo">
                        </div>
                        <div class="codigo-produto">
                            <label for="">Quantidade:</label><br>
                            <input type="number" class="quantid">
                        </div>
                    </div>

                    <div class="inputs-intermediario">
                        <div class="nome-produto">
                            <label for="">Produto:</label><br>
                            <!-- <input type="text"> -->
                            <select id="search" style="width: 380px;">
                                <option value="apple"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="inputs-superior">
                        <div class="precos">
                            <label for="">Preço Unitário:</label><br>
                            <input type="text" disabled class="desativado">
                        </div>
                        <div class="precos2">
                            <label for="">Preço Total:</label><br>
                            <input type="text" disabled class="desativado">
                        </div>
                    </div>

                    <div class="inputs-intermediario">
                        <div class="nome-produto">
                            <input type="submit" value="Adicionar Item" id="add-item" class="add-item">
                        </div>
                    </div>
        
                    <div class="subtotal">
                        <h2>Subtotal:</h2>
                        <div class="valor-subtotal">R$ 0,00</div>
                    </div>

                    <div class="div-botao">
                        <input type="submit" value="Finalizar compra" class="div-finalizacao" id="finalizar-compra">
                    </div>
                    
                </form>
            </div>
            <div class="info-produtos">
                <table>
                    <thead>
                        <tr>
                            <th class="quantidade">Quantidade</th>
                            <th class="codigo">Código</th>
                            <th class="nome">Nome</th>
                            <th class="preco">Preço</th>
                            <th class="desconto">% Desc. item</th>
                            <th class="precodesconto">Preco c/ desc.</th>
                        </tr>
                    </thead>

                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="teclas-atalhos">

        </div>
       
    </div>
        
    <script src="renderer.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
                  
    <script>
        $(document).ready(function() {
        $('#search').select2();  // Torna o select pesquisável
        });
    </script>
</body>
</html>
